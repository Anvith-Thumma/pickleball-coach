services:
  - type: web
    name: pickleball-coach-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DUPR_HISTORY_DIR
        value: /var/data/dupr-history
    disk:
      name: dupr-history-disk
      mountPath: /var/data/dupr-history
      sizeGB: 1
